general:
  domain: example.com
  namespaces: [infra, hobby]
backup:
  webdav_host: https://webdav.example.com
  webdav_username: ${WEBDAV_USERNAME}
  webdav_password: ${WEBDAV_PASSWORD}
  sentry_dsn: ${SENTRY_DSN}
  cron: "*/30 * * * *"
  passphrase: ${BACKUP_PASSPHRASE}
modules:
  - name: cloudflare
    namespace: infra
    secrets:
      cloudflare_api_token: ${CLOUDFLARE_API_TOKEN}
  - name: bitwarden
    namespace: infra
  - name: webdav
    namespace: infra
    secrets:
      webdav_username: ${WEBDAV_MODULE_USERNAME}
      webdav_password: ${WEBDAV_MODULE_PASSWORD}
  - name: hobby-pod
    namespace: infra
    # Optional configuration:
    # secrets:
    #   image_tag: ghcr.io/goalt/work-config:custom-tag  # Custom container image tag
  - name: work-pod
    namespace: infra
    # Optional configuration:
    # secrets:
    #   image_tag: ghcr.io/goalt/work-config:custom-tag  # Custom container image tag
  - name: drone
    namespace: infra
    secrets:
      drone_gitea_client_id: ${DRONE_GITEA_CLIENT_ID}
      drone_gitea_client_secret: ${DRONE_GITEA_CLIENT_SECRET}
      drone_rpc_secret: ${DRONE_RPC_SECRET}
      drone_server_proto: https
  - name: monitoring
    namespace: infra
    secrets:
      sentry_dsn: ${MONITORING_SENTRY_DSN}
  - name: postgres
    namespace: infra
    secrets:
      admin_postgres_user: ${POSTGRES_USER}
      admin_postgres_password: ${POSTGRES_PASSWORD}
  - name: postgres-exporter
    namespace: infra
    # Optional configuration - defaults shown below:
    # secrets:
    #   data_source_uri: postgres:5432/postgres?sslmode=disable
    #   data_source_user: postgres
    #   data_source_pass: postgres
    #   extend_query_path: ""
    #   include_databases: postgres
  - name: pgadmin
    namespace: infra
    secrets:
      pgadmin_default_email: ${PGADMIN_DEFAULT_EMAIL}
      pgadmin_admin_password: ${PGADMIN_ADMIN_PASSWORD}
  - name: gitea
    namespace: infra
    secrets:
      gitea_db_user: ${GITEA_DB_USER}
      gitea_db_password: ${GITEA_DB_PASSWORD}
  - name: grafana
    namespace: infra
    secrets:
      grafana_admin_user: ${GRAFANA_ADMIN_USER}
      grafana_admin_password: ${GRAFANA_ADMIN_PASSWORD}
  - name: redis
    namespace: infra
    secrets:
      redis_password: ${REDIS_PASSWORD}
  - name: prometheus
    namespace: infra
    # Optional secrets for customization:
    # secrets:
    #   prometheus_image: prom/prometheus:v2.48.0  # Customize Prometheus version
    #   storage_size: 10Gi                         # Customize storage size
  - name: ssh-login-notifier
    namespace: infra
    secrets:
      sentry_dsn: ${SSH_NOTIFIER_SENTRY_DSN}
pet-projects:
  - name: myapp
    namespace: hobby
    image: nginx:latest
    imagePullSecret: my-registry-secret
    registryCredentials:
      server: https://registry.example.com
      username: ${REGISTRY_USERNAME}
      password: ${REGISTRY_PASSWORD}
    environment:
      PORT: "8080"
      ENV: "production"
    service:
      ports:
        - name: http
          port: 80
          targetPort: 8080
  - name: api-service
    namespace: hobby
    image: node:18-alpine
    environment:
      NODE_ENV: "development"
      API_PORT: "3000"
    service:
      ports:
        - name: http
          port: 3000
          targetPort: 3000
ingresses:
  - name: web-ingress
    namespace: infra
    rules:
      - host: gitea.example.com
        path: /
        pathType: Prefix
        serviceName: gitea
        servicePort: 3000
      - host: bitwarden.example.com
        path: /
        pathType: Prefix
        serviceName: bitwarden
        servicePort: 80
    tls: true
  - name: tcp-udp-services
    namespace: infra
    # TCP services exposed through ingress controller
    tcpServices:
      - port: 5432           # External port
        serviceName: postgres
        servicePort: 5432    # Internal service port
      - port: 6379
        serviceName: redis
        servicePort: 6379
      - port: 2222           # Custom SSH port
        serviceName: gitea
        servicePort: 22
        namespace: infra     # Optional: defaults to ingress namespace
    # UDP services exposed through ingress controller
    udpServices:
      - port: 1194           # OpenVPN port
        serviceName: openvpn
        servicePort: 1194

